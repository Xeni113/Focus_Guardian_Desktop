name: "Publish Cross-Platform Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Windows x86_64
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            args: ""

          # 2. Windows ARM64
          - platform: "windows-latest"
            target: "aarch64-pc-windows-msvc"
            args: "--target aarch64-pc-windows-msvc"

          # 3. Linux x86_64 (.AppImage, .deb)
          - platform: "ubuntu-22.04"
            target: "x86_64-unknown-linux-gnu"
            args: ""

          # 4. macOS Apple Silicon (M1/M2/M3/M4)
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux-specific dependencies needed by Tauri v2
      - name: install webkit2gtk and GTK dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libappindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm ci

      - name: build app with Tauri CLI
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'FocusGuardian ${{ github.ref_name }}'
          releaseBody: 'Automated multi-platform desktop release.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
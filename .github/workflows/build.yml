name: "Publish Cross-Platform Release"

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  publish-tauri:
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Windows x86_64
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            args: ""

          # 2. Windows ARM64
          - platform: "windows-latest"
            target: "aarch64-pc-windows-msvc"
            args: "--target aarch64-pc-windows-msvc"

          # 3. Linux x86_64
          - platform: "ubuntu-22.04"
            target: "x86_64-unknown-linux-gnu"
            args: ""

          # 4. macOS Apple Silicon
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux-specific dependencies needed by Tauri v2
      - name: Install webkit2gtk and GTK dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libappindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app and Publish to GitHub Releases
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'FocusGuardian ${{ github.ref_name }}'
          releaseBody: 'Automated multi-platform desktop release.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}